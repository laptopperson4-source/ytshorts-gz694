<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ytshorts</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c94d0">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  #bar{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    background:#7c94d0;color:#111111;box-sizing:border-box;
  }
  #bar img{width:24px;height:24px;border-radius:6px;flex-shrink:0;}
  #bar span{font-weight:600;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #bar button{
    font:inherit;font-weight:600;font-size:13px;border:none;border-radius:8px;
    padding:8px 14px;cursor:pointer;background:#111111;color:#7c94d0;flex-shrink:0;
  }
  .hidden{display:none !important;}
  #iosHint{background:#7c94d0;color:#111111;font-size:12px;padding:0 14px 10px;opacity:0.9;box-sizing:border-box;}
  #frame{border:0;width:100%;height:calc(100% - 46px);display:block;}
  body.standalone #bar, body.standalone #iosHint{display:none;}
  body.standalone #frame{height:100%;}
  #fallback{position:fixed;left:0;right:0;bottom:0;text-align:center;font-size:11.5px;padding:6px;background:rgba(0,0,0,0.04);}
  #fallback a{color:#7c94d0;}
</style>
</head>
<body>
<div id="bar">
  <img src="icons/icon-192.png" alt="">
  <span>Ytshorts</span>
  <button id="installBtn" class="hidden">Install</button>
</div>
<div id="iosHint" class="hidden">Tap Share ↑ then "Add to Home Screen" to install</div>
<iframe id="frame" src="https://ytshorts.site" title="Ytshorts"></iframe>
<div id="fallback">If the app looks blank, <a href="https://ytshorts.site" target="_blank" rel="noopener">open it directly</a></div>

<script>
  var deferredPrompt = null;
  var installBtn = document.getElementById('installBtn');
  var iosHint = document.getElementById('iosHint');

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }

  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  if (isStandalone()) {
    document.body.classList.add('standalone');
  } else {
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

    window.addEventListener('beforeinstallprompt', function(e){
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', function(){
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(choice){
        deferredPrompt = null;
        if (choice.outcome === 'accepted') installBtn.classList.add('hidden');
      });
    });

    if (isIOS) iosHint.classList.remove('hidden');
  }
</script>
</body>
</html>
